<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Predictor — Gambling.com</title>
  <meta name="description" content="Predict every match of the FIFA World Cup 2026. Free to play, £10,000 in prizes.">
  <meta property="og:title" content="World Cup Predictor — Gambling.com">
  <meta property="og:description" content="Predict every match of the FIFA World Cup 2026. Free to play, £10,000 in prizes.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://www.gambling.com/world-cup-predictor">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="app.css?v=4">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body data-hero-style="wcEnergy">
  <div id="root"></div>

  <script src="data.js?v=4"></script>
  <script type="text/babel" src="icons.jsx?v=4"></script>
  <script type="text/babel" src="screens.jsx?v=4"></script>
  <script type="text/babel" src="outrights.jsx?v=4"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [active, setActive] = useState('home');
      const [overlay, setOverlay] = useState(null);
      const [toast, setToast] = useState(null);

      useEffect(() => {
        const onToast = (e) => {
          setToast(e.detail);
          setTimeout(() => setToast(null), 2200);
        };
        window.addEventListener('wcp:toast', onToast);
        return () => window.removeEventListener('wcp:toast', onToast);
      }, []);

      const screens = window.Screens;

      const goTo = (id) => {
        if (id === 'prizes' || id === 'how') {
          setOverlay(id);
        } else if (id === 'outrights') {
          setOverlay(null);
          setActive('outrights');
        } else {
          setOverlay(null);
          setActive(id);
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const renderActive = () => {
        if (active === 'home') return <screens.HomeScreen setActive={goTo}/>;
        if (active === 'predict') return <screens.PredictScreen/>;
        if (active === 'bracket') return <screens.BracketScreen/>;
        if (active === 'outrights') return <window.OutrightsScreen/>;
        if (active === 'leagues') return <screens.LeaguesScreen/>;
        if (active === 'profile') return <screens.ProfileScreen openPrizes={() => setOverlay('prizes')}/>;
        return null;
      };

      if (overlay === 'signup') {
        return (
          <div className="app-shell">
            <screens.SignupScreen onDone={() => setOverlay(null)}/>
          </div>
        );
      }

      return (
        <div className="app-shell">
          <screens.TopBar onSignup={() => setOverlay('signup')}/>
          <screens.SubNav active={overlay || active} setActive={goTo}/>
          <div className="app-body">
            {overlay === 'prizes' ? <screens.PrizesScreen onBack={() => setOverlay(null)}/>
              : overlay === 'how' ? <screens.HowItWorksScreen onBack={() => setOverlay(null)}/>
              : renderActive()}
          </div>
          <SiteFooter/>
          {toast && (
            <div className="toast" role="status">
              <span className="check">✓</span>{toast}
            </div>
          )}
        </div>
      );
    }

    function SiteFooter() {
      return (
        <footer className="site-footer">
          <div className="site-footer-inner">
            <div className="site-footer-cols">
              <div>
                <div className="ft-brand">
                  <div className="mark">G</div>
                  <div className="name">Gambling<span>.com</span></div>
                </div>
                <p>Free-to-play World Cup Predictor. Real prizes, real fun, no purchase necessary. 18+ only.</p>
              </div>
              <div>
                <h5>Predictor</h5>
                <ul>
                  <li>Overview</li>
                  <li>Predictions</li>
                  <li>Knockout bracket</li>
                  <li>Outrights</li>
                  <li>Leaderboards</li>
                </ul>
              </div>
              <div>
                <h5>Company</h5>
                <ul>
                  <li>About</li>
                  <li>Editorial standards</li>
                  <li>Careers</li>
                  <li>Contact</li>
                </ul>
              </div>
              <div>
                <h5>Play responsibly</h5>
                <ul>
                  <li>BeGambleAware</li>
                  <li>GamCare</li>
                  <li>Self-exclusion</li>
                  <li>Full T&amp;Cs</li>
                </ul>
              </div>
            </div>
            <div className="site-footer-bottom">
              <span>© 2026 GDC Group. All rights reserved.</span>
              <span className="age">18+</span>
            </div>
          </div>
        </footer>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <style>
    .site-footer {
      background: #050A30;
      color: rgba(255,255,255,0.7);
      padding: 48px 20px 24px;
      margin-top: 24px;
    }
    .site-footer-inner { max-width: 1140px; margin: 0 auto; }
    .site-footer-cols {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1fr;
      gap: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    @media (max-width: 720px) {
      .site-footer-cols { grid-template-columns: 1fr 1fr; gap: 24px; }
    }
    .site-footer-cols p { font-size: 12.5px; line-height: 1.6; margin-top: 12px; max-width: 320px; }
    .site-footer h5 {
      color: #fff; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin: 0 0 12px;
    }
    .site-footer ul { list-style: none; padding: 0; margin: 0; }
    .site-footer li { font-size: 13px; padding: 4px 0; cursor: pointer; }
    .site-footer li:hover { color: #fff; }
    .ft-brand { display: flex; align-items: center; gap: 10px; }
    .ft-brand .mark {
      width: 32px; height: 32px;
      background: var(--gdc-blue-600);
      border-radius: 6px;
      display: grid; place-items: center;
      font-weight: 800; color: #fff;
      font-size: 16px;
    }
    .ft-brand .name { font-weight: 800; font-size: 16px; color: #fff; line-height: 1; }
    .ft-brand .name span { color: var(--gdc-blue-500); }
    .site-footer-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 20px;
      font-size: 12px;
    }
    .site-footer-bottom .age {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: grid; place-items: center;
      font-weight: 800; color: #fff;
      font-size: 11px;
    }
  </style>
</body>
</html>
