<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Predictor — Gambling.com</title>
  <meta name="description" content="Predict every match of the FIFA World Cup 2026. Free to play, £10,000 in prizes.">
  <meta property="og:title" content="World Cup Predictor — Gambling.com">
  <meta property="og:description" content="Predict every match of the FIFA World Cup 2026. Free to play, £10,000 in prizes.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://www.gambling.com/world-cup-predictor">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="app.css?v=6">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body data-hero-style="wcEnergy">
  <div id="root"></div>

  <script src="data.js?v=6"></script>
  <script type="text/babel" src="icons.jsx?v=6"></script>
  <script type="text/babel" src="screens.jsx?v=6"></script>
  <script type="text/babel" src="outrights.jsx?v=6"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [active, setActive] = useState('home');
      const [overlay, setOverlay] = useState(null);
      const [toast, setToast] = useState(null);

      useEffect(() => {
        const onToast = (e) => {
          setToast(e.detail);
          setTimeout(() => setToast(null), 2200);
        };
        window.addEventListener('wcp:toast', onToast);
        return () => window.removeEventListener('wcp:toast', onToast);
      }, []);

      const screens = window.Screens;

      const goTo = (id) => {
        if (id === 'prizes' || id === 'how') {
          setOverlay(id);
        } else if (id === 'outrights') {
          setOverlay(null);
          setActive('outrights');
        } else {
          setOverlay(null);
          setActive(id);
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const renderActive = () => {
        if (active === 'home') return <screens.HomeScreen setActive={goTo}/>;
        if (active === 'predict') return <screens.PredictScreen/>;
        if (active === 'bracket') return <screens.BracketScreen/>;
        if (active === 'outrights') return <window.OutrightsScreen/>;
        if (active === 'leagues') return <screens.LeaguesScreen/>;
        if (active === 'profile') return <screens.ProfileScreen openPrizes={() => setOverlay('prizes')}/>;
        return null;
      };

      if (overlay === 'signup') {
        return (
          <div className="app-shell">
            <screens.SignupScreen onDone={() => setOverlay(null)}/>
          </div>
        );
      }

      return (
        <div className="app-shell">
          <screens.SubNav active={overlay || active} setActive={goTo}/>
          <div className="app-body">
            {overlay === 'prizes' ? <screens.PrizesScreen onBack={() => setOverlay(null)}/>
              : overlay === 'how' ? <screens.HowItWorksScreen onBack={() => setOverlay(null)}/>
              : renderActive()}
          </div>
          {toast && (
            <div className="toast" role="status">
              <span className="check">✓</span>{toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
