<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="road" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="roadline" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="90" r="68" stroke="url(#ring)" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="320 108"/>
  <!-- Road path -->
  <path d="M100 90 Q95 120 88 145 Q82 165 75 175 L90 175 Q95 165 98 145 Q100 130 100 90Z" fill="url(#road)"/>
  <path d="M100 90 Q105 120 112 145 Q118 165 125 175 L110 175 Q105 165 102 145 Q100 130 100 90Z" fill="url(#road)"/>
  <!-- Road center line (dashes) -->
  <line x1="100" y1="100" x2="100" y2="170" stroke="url(#roadline)" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/>
  <!-- Four-pointed star -->
  <!-- Vertical points -->
  <polygon points="100,22 104,75 100,90 96,75" fill="url(#star)"/>
  <polygon points="100,158 104,105 100,90 96,105" fill="url(#star)" opacity="0.6"/>
  <!-- Horizontal points -->
  <polygon points="38,90 75,86 90,90 75,94" fill="url(#star)" opacity="0.8"/>
  <polygon points="162,90 125,86 110,90 125,94" fill="url(#star)" opacity="0.8"/>
  <!-- Inner diamond sparkle -->
  <polygon points="100,78 106,90 100,102 94,90" fill="white" opacity="0.9"/>
  <!-- Tiny sparkle dot -->
  <circle cx="100" cy="90" r="3" fill="white"/>
</svg>
