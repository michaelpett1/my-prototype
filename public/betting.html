        /* ── Category Cards ── */
        const CategoryCards = {
            props: { categories: { type: Array, required: true }, activeCategory: { type: String, default: null } },
            template: `
            <div>
                <div class="grid grid-cols-3 gap-4 max-[480px]:gap-2">
                    <a v-for="card in categories" :key="card.id" :href="card.href || ('#' + card.id)"
                       :class="['no-underline text-inherit rounded-lg overflow-hidden transition-shadow duration-200 hover:shadow-[0_4px_16px_rgba(0,0,0,0.1)] hover:no-underline', card.id === activeCategory ? 'ring-2 ring-[#0157FF] shadow-[0_4px_16px_rgba(1,87,255,0.15)]' : '']">
                        <div class="w-full h-[120px] max-md:h-[80px] max-[480px]:h-[70px] rounded-lg bg-cover bg-center" :style="{ backgroundImage: 'url(' + card.image + ')' }"></div>
                        <div class="flex items-center justify-center gap-1 text-sm max-[480px]:text-xs font-semibold text-black py-2 max-[480px]:py-1 text-center">
                            {{ card.label }}
                        </div>
                    </a>
                </div>
            </div>`,
        };

        /* ── Strategy AI Assistant ── */
        const StrategyAssistant = {
            props: {
                articles: { type: Array, required: true },
                category: { type: String, default: 'Strategy' },
            },
            data() {
                return {
                    query: '',
                    messages: [],
                    isTyping: false,
                    isExpanded: true,
                };
            },
            mounted() {
                this.messages.push({
                    role: 'assistant',
                    text: 'Hi! I\'m your ' + this.category + ' strategy assistant. Ask me anything about our ' + this.category.toLowerCase() + ' strategy guides and I\'ll find the most relevant articles for you.',
                });
            },
            methods: {
                toggleExpand() {
                    this.isExpanded = !this.isExpanded;
                },
                async submitQuery() {
                    const q = this.query.trim();
                    if (!q || this.isTyping) return;
                    this.messages.push({ role: 'user', text: q });
                    this.query = '';
                    this.isTyping = true;
                    await new Promise(r => setTimeout(r, 800 + Math.random() * 1200));
                    const matches = this.findRelevantArticles(q);
                    let response;
                    if (matches.length > 0) {
                        const articleList = matches.slice(0, 3).map(a =>
                            '<a href="' + a.url + '" class="text-[#0157FF] font-semibold hover:underline">' + a.title + '</a> — ' + a.excerpt
                        ).join('<br><br>');
                        response = 'Based on our ' + this.category.toLowerCase() + ' strategy guides, here\'s what I found:<br><br>' + articleList;
                    } else {
                        response = 'I couldn\'t find a specific guide matching that query in our ' + this.category.toLowerCase() + ' strategy collection. Try asking about topics like ' + this.getSuggestions() + '.';
                    }
                    this.messages.push({ role: 'assistant', text: response });
                    this.isTyping = false;
                    this.$nextTick(() => {
                        const container = this.$refs.chatMessages;
                        if (container) container.scrollTop = container.scrollHeight;
                    });
                },
                findRelevantArticles(query) {
                    const q = query.toLowerCase();
                    const words = q.split(/\s+/).filter(w => w.length > 2);
                    const scored = this.articles.map(article => {
                        const text = (article.title + ' ' + article.excerpt).toLowerCase();
                        let score = 0;
                        words.forEach(word => {
                            if (text.includes(word)) score += 1;
                            if (article.title.toLowerCase().includes(word)) score += 2;
                        });
                        if (text.includes(q)) score += 5;
                        return { ...article, score };
                    });
                    return scored.filter(a => a.score > 0).sort((a, b) => b.score - a.score);
                },
                getSuggestions() {
                    const titles = this.articles.slice(0, 4).map(a => {
                        const short = a.title.split(':')[0].trim();
                        return '<strong>' + short + '</strong>';
                    });
                    return titles.join(', ');
                },
            },
            template: `
            <div class="border border-[#ECECEF] rounded-xl overflow-hidden bg-white transition-all duration-300" :class="isExpanded ? 'shadow-[0_4px_24px_rgba(1,87,255,0.1)]' : ''">
                <!-- Collapsed bar -->
                <button @click="toggleExpand" class="w-full flex items-center gap-3 px-5 py-3.5 bg-white hover:bg-[#F9F9FB] transition-colors duration-200 cursor-pointer border-none text-left">

                        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <div class="flex-1">
                        <div class="text-[15px] font-semibold text-black leading-tight">Ask our {{ category }} Strategy AI</div>
                        <div class="text-[13px] text-[#999] leading-tight mt-0.5">Get instant answers from our expert strategy guides</div>
                    </div>
                    <svg class="w-5 h-5 text-[#999] transition-transform duration-200 shrink-0" :class="isExpanded ? 'rotate-180' : ''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>

                <!-- Expanded chat -->
                <div v-if="isExpanded" class="border-t border-[#ECECEF]">
                    <!-- Messages -->
                    <div ref="chatMessages" class="px-5 py-4 max-h-[320px] overflow-y-auto hide-scrollbar flex flex-col gap-3">
                        <div v-for="(msg, i) in messages" :key="i" class="flex" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                            <div v-if="msg.role === 'assistant'" class="flex gap-2.5 max-w-[85%]">
                                <div class="w-7 h-7 rounded-md bg-gradient-to-br from-[#0157FF] to-[#003EE6] flex items-center justify-center shrink-0 mt-0.5">
                                    <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <div class="bg-[#F4F6FA] rounded-xl rounded-tl-sm px-4 py-3 text-[14px] leading-[22px] text-black" v-html="msg.text"></div>
                            </div>
                            <div v-else class="bg-[#0157FF] text-white rounded-xl rounded-tr-sm px-4 py-3 text-[14px] leading-[22px] max-w-[75%]">{{ msg.text }}</div>
                        </div>
                        <div v-if="isTyping" class="flex gap-2.5">
                            <div class="w-7 h-7 rounded-md bg-gradient-to-br from-[#0157FF] to-[#003EE6] flex items-center justify-center shrink-0 mt-0.5">
                                <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            </div>
                            <div class="bg-[#F4F6FA] rounded-xl rounded-tl-sm px-4 py-3 flex items-center gap-1.5">
                                <span class="w-2 h-2 bg-[#999] rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                                <span class="w-2 h-2 bg-[#999] rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                                <span class="w-2 h-2 bg-[#999] rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Input -->
                    <div class="px-5 pb-4">
                        <form @submit.prevent="submitQuery" class="flex gap-2">
                            <input v-model="query" type="text" :placeholder="'Ask about ' + category.toLowerCase() + ' strategy...'" class="flex-1 h-11 px-4 rounded-lg border border-[#ECECEF] bg-[#F9F9FB] text-[14px] text-black placeholder-[#999] outline-none transition-colors duration-200 focus:border-[#0157FF] focus:bg-white focus:shadow-[0_0_0_3px_rgba(1,87,255,0.1)]" :disabled="isTyping" />
                            <button type="submit" :disabled="!query.trim() || isTyping" class="h-11 px-5 rounded-lg bg-[#0157FF] text-white text-[14px] font-semibold border-none cursor-pointer transition-all duration-200 hover:bg-[#003EE6] disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 shrink-0">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                Ask
                            </button>
                        </form>
                        <p class="text-[11px] text-[#999] mt-2 text-center">Answers sourced exclusively from our {{ category.toLowerCase() }} strategy guides</p>
                    </div>
                </div>
            </div>`,
        };

        const app = createApp({ data() { return { pageData }; } });
        app.component('site-header', SiteHeader);
        app.component('site-footer', SiteFooter);
        app.component('featured-card', FeaturedCard);
        app.component('article-card', ArticleCard);
        app.component('rewards-banner', RewardsBanner);
        app.component('category-cards', CategoryCards);
        app.component('strategy-assistant', StrategyAssistant);
        app.mount('#app');
    </script>
</body>
