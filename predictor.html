/* Predictor 26 — global tokens & shared styles */
:root {
  --bg: #06120e;
  --bg-2: #0a1a14;
  --surface: #0f2118;
  --surface-2: #14291f;
  --line: rgba(255, 255, 255, 0.07);
  --line-2: rgba(255, 255, 255, 0.12);
  --text: #e7f2ec;
  --text-2: #9fb5a9;
  --text-3: #6e8377;
  --accent: #22c55e;
  --accent-2: #16a34a;
  --accent-soft: rgba(34, 197, 94, 0.14);
  --gold: #fde68a;
  --gold-2: #f5b942;
  --silver: #d6dde2;
  --bronze: #d8956b;
  --danger: #ef4444;
  --warn: #f59e0b;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Anton', 'Bebas Neue', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
}
* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.p26-display { font-family: var(--font-display); font-style: italic; letter-spacing: 0.01em; text-transform: uppercase; font-weight: 400; }
.p26-label { font-family: var(--font-sans); font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); }
.p26-mono { font-family: var(--font-mono); letter-spacing: 0.02em; }

.p26-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid rgba(34, 197, 94, 0.25);
}
.p26-pill.is-muted { background: rgba(255,255,255,0.04); color: var(--text-2); border-color: var(--line); }
.p26-pill.is-warn  { background: rgba(245,158,11,0.12); color: var(--warn); border-color: rgba(245,158,11,0.25); }
.p26-pill.is-danger{ background: rgba(239,68,68,0.12); color: var(--danger); border-color: rgba(239,68,68,0.25); }

.p26-dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }

.p26-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0)), var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
}

.p26-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: 999px;
  font-family: var(--font-sans); font-weight: 600; font-size: 13px; letter-spacing: 0.02em;
  border: none; cursor: pointer;
  transition: transform .12s, background .12s, color .12s, box-shadow .12s;
  background: var(--accent); color: #06120e;
}
.p26-btn:hover { background: #2bd76a; }
.p26-btn:active { transform: translateY(1px); }
.p26-btn.is-ghost { background: transparent; color: var(--text); border: 1px solid var(--line-2); }
.p26-btn.is-ghost:hover { background: rgba(255,255,255,0.04); }
.p26-btn.is-outline { background: transparent; color: var(--accent); border: 1px solid rgba(34,197,94,0.4); }
.p26-btn.is-outline:hover { background: var(--accent-soft); }
.p26-btn.is-sm { padding: 7px 12px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

.p26-flag { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-weight: 600; font-size: 13px; }
.p26-flag .dot {
  width: 22px; height: 16px; border-radius: 3px;
  background: var(--surface-2);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
  color: #06120e; flex-shrink: 0;
}

.p26-score {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
  font-family: var(--font-display); font-style: italic; font-size: 22px;
  text-align: center; outline: none;
  transition: border-color .12s, background .12s, box-shadow .12s;
}
.p26-score:focus, .p26-score.has-value { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.08); color: var(--accent); }
.p26-score:disabled { opacity: 0.5; cursor: not-allowed; }

.p26-logo {
  font-family: var(--font-display); font-style: italic; font-size: 22px; letter-spacing: 0.02em;
  color: var(--text); display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase;
}
.p26-logo .accent { color: var(--accent); }
.p26-logo .mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--accent); color: #06120e;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; letter-spacing: 0; font-style: normal; font-family: var(--font-display);
}

.p26-input {
  background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 14px; color: var(--text);
  font-family: var(--font-sans); font-size: 13px; outline: none;
  transition: border-color .12s, background .12s;
}
.p26-input:focus { border-color: rgba(34,197,94,0.4); }
.p26-input::placeholder { color: var(--text-3); }

.p26-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); }
.p26-tab {
  font-family: var(--font-display); font-style: italic; font-size: 14px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-3); background: transparent; border: none;
  padding: 12px 16px; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .12s, border-color .12s;
}
.p26-tab:hover { color: var(--text-2); }
.p26-tab.is-active { color: var(--text); border-bottom-color: var(--accent); }

.p26-screen::-webkit-scrollbar { display: none; }
.p26-screen { scrollbar-width: none; }

.p26-bg-dots {
  background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 18px 18px;
}

.p26-gold-text {
  background: linear-gradient(180deg, #fde68a 0%, #f5b942 60%, #c98c2a 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

.p26-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-2);
}
.p26-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 999px;
  background: var(--accent); box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
}

/* Responsive: hide desktop-only and mobile-only by default */
.p26-only-desktop { display: block; }
.p26-only-mobile { display: none; }
@media (max-width: 820px) {
  .p26-only-desktop { display: none !important; }
  .p26-only-mobile { display: block !important; }
}
</style>
</head>

function FixtureRow({ fixture, pick, setPick }) {
  const [home, setHome] = React.useState(pick?.home ?? '');
  const [away, setAway] = React.useState(pick?.away ?? '');
  function commit(h, a) { setHome(h); setAway(a); if (h !== '' && a !== '') setPick(h, a); }
  return (
    <div className="p26-card" style={{
      padding: '16px 22px', display: 'grid',
      gridTemplateColumns: '90px 1fr auto 1fr 80px',
      alignItems: 'center', gap: 14, marginBottom: 8,
    }}>
      <div>
        <div className="p26-mono" style={{ fontSize: 11, color: 'var(--text-3)', letterSpacing: '0.05em' }}>{fixture.date}</div>
        <div className="p26-mono" style={{ fontSize: 11, color: 'var(--text-2)' }}>{fixture.time}</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, justifyContent: 'flex-end' }}>
        <span style={{ fontSize: 14, fontWeight: 500 }}>{fixture.home.name}</span>
        <Flag team={fixture.home} />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <input className={`p26-score${home !== '' ? ' has-value' : ''}`} type="text" inputMode="numeric" maxLength={1}
          value={home} onChange={(e) => commit(e.target.value.replace(/[^\d]/g, ''), away)} placeholder="–" />
        <span style={{ color: 'var(--text-3)', fontSize: 11, fontFamily: 'var(--font-mono)' }}>vs</span>
        <input className={`p26-score${away !== '' ? ' has-value' : ''}`} type="text" inputMode="numeric" maxLength={1}
          value={away} onChange={(e) => commit(home, e.target.value.replace(/[^\d]/g, ''))} placeholder="–" />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <Flag team={fixture.away} />
        <span style={{ fontSize: 14, fontWeight: 500 }}>{fixture.away.name}</span>
      </div>
      <div style={{ textAlign: 'right' }}>
        {pick ? (
          <span style={{ color: 'var(--accent)', display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>
            {I.check} Saved
          </span>
        ) : (
          <span className="p26-label" style={{ color: 'var(--text-3)' }}>OPEN</span>
        )}
      </div>
    </div>
  );
}

function BracketGrid({ r32 }) {
  const rounds = [
    { id: 'r32', label: 'ROUND OF 32', count: 8 },
    { id: 'r16', label: 'ROUND OF 16', count: 4 },
    { id: 'qf', label: 'QUARTERS', count: 2 },
    { id: 'sf', label: 'SEMIS', count: 1 },
    { id: 'f', label: 'FINAL', count: 1 },
  ];
  function teamRow(label, top) {
    return (
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '8px 10px', borderBottom: top ? '1px solid var(--line)' : 'none',
      }}>
        <span style={{ fontSize: 12, color: 'var(--text-3)', fontFamily: 'var(--font-mono)' }}>{label}</span>
        <input className="p26-score" disabled style={{ width: 28, height: 28, fontSize: 16, opacity: 0.4 }} placeholder="–" />
      </div>
    );
  }
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, minmax(0, 1fr))', gap: 16, alignItems: 'stretch', overflowX: 'auto' }}>
      {rounds.map((r, ri) => (
        <div key={r.id}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <span className="p26-display" style={{ fontSize: 16, color: ri === 0 ? 'var(--text)' : 'var(--text-3)' }}>{r.label}</span>
            {ri === 0 && <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--warn)' }} />}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, height: '100%', justifyContent: 'space-around' }}>
            {Array.from({ length: r.count }).map((_, i) => {
              const m = r32[i] || ['—', '—'];
              const isFinal = r.id === 'f';
              return (
                <div key={i} style={{
                  background: isFinal ? 'linear-gradient(180deg, rgba(253,230,138,0.06), rgba(245,185,66,0.02))' : 'var(--surface-2)',
                  border: `1px solid ${isFinal ? 'rgba(253,230,138,0.25)' : 'var(--line)'}`,
                  borderRadius: 10, opacity: ri === 0 ? 1 : 0.55,
                  flex: r.count === 1 ? 'none' : 1, alignSelf: 'center', width: '100%',
                }}>
                  {ri === 0 ? (<>{teamRow(m[0], true)}{teamRow(m[1], false)}</>)
                    : (<>
                        <div style={{ padding: '8px 10px', borderBottom: '1px solid var(--line)' }}>
                          <span className="p26-mono" style={{ fontSize: 11, color: 'var(--text-3)' }}>—</span>
                        </div>
                        <div style={{ padding: '8px 10px' }}>
                          <span className="p26-mono" style={{ fontSize: 11, color: 'var(--text-3)' }}>—</span>
                        </div>
                      </>)
                  }
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

    <div className="p26-card" style={{ padding: 22 }}>

            <div className="p26-label" style={{ color: 'var(--text-3)' }}>{subtitle}</div>

          <button onClick={() => onPick(null)} style={{ background: 'transparent', border: 'none', color: 'var(--text-3)', cursor: 'pointer', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>Clear</button>

// ============ APP SHELL ============
function App() {
  const [screen, setScreen] = React.useState('landing');
  const [signedIn, setSignedIn] = React.useState(false);
  const [showSignUp, setShowSignUp] = React.useState(false);
  const [picks, setPicks] = React.useState({
    G1: { home: 1, away: 1 },
    G2: { home: 2, away: 0 },
    G7: { home: 0, away: 1 },
    G13: { home: 1, away: 2 },
  });
  const [outrights, setOutrights] = React.useState({
    winner: 'ARG', second: 'FRA', third: 'ENG',
    boot: 'Kylian Mbappé', goals: '168', cards: '240',
  });

  function setPick(fid, home, away) {
    setPicks(p => ({ ...p, [fid]: { home: parseInt(home, 10) || 0, away: parseInt(away, 10) || 0 } }));
  }
  function setOutright(k, v) { setOutrights(o => ({ ...o, [k]: v })); }
  function onSignIn() { setShowSignUp(true); }
  function onSignUp() { setSignedIn(true); setShowSignUp(false); setScreen('dashboard'); }
  function onNav(s) { setScreen(s); window.scrollTo({ top: 0, behavior: 'instant' }); }

  const props = { onNav, onSignIn, signedIn, picks, setPick, outrights, setOutright };

  let content;
  switch (screen) {
    case 'group':       content = <GroupStageScreen  {...props} />; break;
    case 'bracket':     content = <BracketScreen     {...props} />; break;
    case 'outrights':   content = <OutrightsScreen   {...props} />; break;
    case 'dashboard':   content = <DashboardScreen   {...props} signedIn={true} />; break;
    case 'leaderboard': content = <LeaderboardScreen {...props} />; break;
    case 'leagues':     content = <LeaguesScreen     {...props} />; break;
    default:            content = <LandingScreen     {...props} />;
  }

  return (
    <div style={{ minHeight: '100%', position: 'relative' }}>
      {content}
      {showSignUp && (
        <SignUpModal onClose={() => setShowSignUp(false)} onSignUp={onSignUp} picks={picks} outrights={outrights} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
